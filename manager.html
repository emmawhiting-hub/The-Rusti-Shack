<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager — The Rusti Shack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #1A7A9E;
      --navy-dark: #0F5E7A;
      --teal:      #00B4A0;
      --teal-light:#DFF5F2;
      --orange:    #E8622A;
      --sand:      #FEF9F1;
      --white:     #ffffff;
      --light:     #EBF6FA;
      --border:    #CEEAF0;
      --gray:      #5A7A8A;
      --gray-light:#8AAAB8;
      --dark:      #0D2B3A;
      --sidebar-w: 220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--sand); color: var(--dark); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
    }
    .login-card {
      background: var(--white); border-radius: 16px; padding: 48px 40px;
      width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--navy); margin-bottom: 8px; }
    .login-sub { font-size: 13px; color: var(--gray); margin-bottom: 32px; }
    .login-card label { display: block; font-size: 12px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .login-card input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--navy); }
    .login-btn {
      width: 100%; margin-top: 20px; padding: 13px; background: var(--navy);
      color: var(--white); border: none; border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: background .2s;
    }
    .login-btn:hover { background: var(--navy-dark); }
    .login-error { margin-top: 12px; font-size: 13px; color: #e53e3e; text-align: center; min-height: 18px; }

    /* ── Dashboard layout ── */
    #dashboard-screen { display: none; min-height: 100vh; }
    .mgr-layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .mgr-sidebar {
      width: var(--sidebar-w); background: var(--dark); color: var(--white);
      display: flex; flex-direction: column; flex-shrink: 0; position: fixed;
      top: 0; left: 0; height: 100vh; overflow-y: auto;
    }
    .mgr-brand {
      padding: 28px 20px 24px; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .mgr-brand-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--white); line-height: 1.2; }
    .mgr-brand-sub { font-size: 11px; color: var(--gray-light); margin-top: 3px; text-transform: uppercase; letter-spacing: .08em; }
    .mgr-nav { padding: 16px 0; flex: 1; }
    .mgr-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,.6); cursor: pointer; transition: all .15s;
      border-left: 3px solid transparent;
    }
    .mgr-nav-item:hover { color: var(--white); background: rgba(255,255,255,.05); }
    .mgr-nav-item.active { color: var(--white); border-left-color: var(--teal); background: rgba(0,180,160,.1); }
    .mgr-nav-item svg { flex-shrink: 0; }
    .mgr-signout {
      padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08);
      font-size: 13px; color: rgba(255,255,255,.4); cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .mgr-signout:hover { color: rgba(255,255,255,.7); }

    /* Main */
    .mgr-main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .mgr-topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .mgr-page-title { font-size: 17px; font-weight: 700; color: var(--dark); }
    .mgr-site-link { font-size: 12px; color: var(--gray); text-decoration: none; }
    .mgr-site-link:hover { color: var(--navy); }
    .mgr-content { padding: 28px 32px; flex: 1; }

    /* KPI cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
    .kpi-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 12px;
      padding: 22px 24px;
    }
    .kpi-label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 800; color: var(--dark); line-height: 1; }
    .kpi-value.teal { color: var(--teal); }
    .kpi-value.navy { color: var(--navy); }
    .kpi-sub { font-size: 12px; color: var(--gray-light); margin-top: 4px; }

    /* Tables */
    .mgr-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; margin-bottom: 24px;
    }
    .mgr-card-header {
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .mgr-card-title { font-size: 14px; font-weight: 700; color: var(--dark); }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 11px; font-weight: 600; color: var(--gray);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 10px 22px; background: var(--light); border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 22px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--sand); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-teal { background: var(--teal-light); color: var(--teal); }
    .badge-gray { background: var(--light); color: var(--gray); }

    /* CSV button */
    .csv-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; background: var(--dark); color: var(--white);
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background .15s;
    }
    .csv-btn:hover { background: var(--navy-dark); }

    /* Loading / empty */
    .mgr-loading { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 14px; }
    .mgr-empty { text-align: center; padding: 40px 20px; color: var(--gray-light); font-size: 13px; }

    /* Search bar */
    .mgr-search {
      padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; outline: none; width: 220px; transition: border-color .2s;
    }
    .mgr-search:focus { border-color: var(--navy); }

    @media (max-width: 768px) {
      .mgr-sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; }
      .mgr-main { margin-left: 0; }
      .kpi-grid { grid-template-columns: 1fr; }
      .mgr-content { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">The Rusti Shack</div>
    <div class="login-sub">Manager Portal — Authorized Access Only</div>
    <form id="login-form" onsubmit="submitLogin(event)">
      <label for="mgr-pw">Password</label>
      <input type="password" id="mgr-pw" autocomplete="current-password" required>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard-screen">
  <div class="mgr-layout">

    <!-- Sidebar -->
    <nav class="mgr-sidebar">
      <div class="mgr-brand">
        <div class="mgr-brand-title">The Rusti Shack</div>
        <div class="mgr-brand-sub">Manager Portal</div>
      </div>
      <div class="mgr-nav">
        <div class="mgr-nav-item active" onclick="loadSection('dashboard')" id="nav-dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </div>
        <div class="mgr-nav-item" onclick="loadSection('orders')" id="nav-orders">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Orders
        </div>
        <div class="mgr-nav-item" onclick="loadSection('customers')" id="nav-customers">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          Customers
        </div>
        <div class="mgr-nav-item" onclick="loadSection('products')" id="nav-products">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Products
        </div>
      </div>
      <div class="mgr-signout" onclick="signOut()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </div>
    </nav>

    <!-- Main -->
    <main class="mgr-main">
      <div class="mgr-topbar">
        <div class="mgr-page-title" id="page-title">Dashboard</div>
        <a href="/" class="mgr-site-link">← Back to store</a>
      </div>
      <div class="mgr-content" id="mgr-content">
        <div class="mgr-loading">Loading…</div>
      </div>
    </main>

  </div>
</div>

<script>
let _token = sessionStorage.getItem('mgr_token') || '';
let _section = 'dashboard';

// ── Auth ──────────────────────────────────────────────────────
async function submitLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  const pw = document.getElementById('mgr-pw').value;
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.textContent = '';

  try {
    const res = await fetch('/api/manager-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) {
      errEl.textContent = 'Incorrect password.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    const { token } = await res.json();
    _token = token;
    sessionStorage.setItem('mgr_token', token);
    showDashboard();
  } catch {
    errEl.textContent = 'Connection error. Try again.';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function signOut() {
  sessionStorage.removeItem('mgr_token');
  _token = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('mgr-pw').value = '';
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  loadSection('dashboard');
}

// Auto-login if token still valid
if (_token) showDashboard();

// ── Data loading ──────────────────────────────────────────────
async function fetchSection(section) {
  const res = await fetch(`/api/manager-data?section=${section}`, {
    headers: { 'x-manager-token': _token },
  });
  if (res.status === 401) { signOut(); return null; }
  return res.json();
}

async function loadSection(section) {
  _section = section;
  document.querySelectorAll('.mgr-nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + section).classList.add('active');
  const titles = { dashboard: 'Dashboard', orders: 'Orders', customers: 'Customers', products: 'Products' };
  document.getElementById('page-title').textContent = titles[section];
  document.getElementById('mgr-content').innerHTML = '<div class="mgr-loading">Loading…</div>';

  const data = await fetchSection(section);
  if (!data) return;

  if (section === 'dashboard') renderDashboard(data);
  if (section === 'orders')    renderOrders(data);
  if (section === 'customers') renderCustomers(data);
  if (section === 'products')  renderProducts(data);
}

// ── Helpers ───────────────────────────────────────────────────
function fmt(n) { return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ── Dashboard ────────────────────────────────────────────────
function renderDashboard(d) {
  document.getElementById('mgr-content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Orders This Week</div>
        <div class="kpi-value navy">${d.ordersThisWeek}</div>
        <div class="kpi-sub">Last 7 days</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Revenue This Week</div>
        <div class="kpi-value teal">${fmt(d.revenueThisWeek)}</div>
        <div class="kpi-sub">Last 7 days</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Top Seller (All Time)</div>
        <div class="kpi-value" style="font-size:18px">${d.topSeller}</div>
        <div class="kpi-sub">${d.topSellerUnits} units sold</div>
      </div>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="kpi-card">
        <div class="kpi-label">Total Customers</div>
        <div class="kpi-value navy">${d.totalCustomers}</div>
      </div>
    </div>
    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">Recent Orders</div>
        <button class="csv-btn" onclick="downloadCSV()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Sales (CSV)
        </button>
      </div>
      ${d.recentOrders.length ? `
      <table>
        <thead><tr><th>Order</th><th>Date</th><th>Customer</th><th>Total</th></tr></thead>
        <tbody>
          ${d.recentOrders.map(o => `
            <tr>
              <td><strong>${o.OrderID}</strong></td>
              <td>${o.OrderDate}</td>
              <td>${o.customerDisplay}</td>
              <td>${fmt(o.OrderTotal)}</td>
            </tr>`).join('')}
        </tbody>
      </table>` : '<div class="mgr-empty">No orders yet.</div>'}
    </div>`;
}

// ── Orders ───────────────────────────────────────────────────
let _ordersData = [];
function renderOrders(d) {
  _ordersData = d.orders || [];
  document.getElementById('mgr-content').innerHTML = `
    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">All Orders (${_ordersData.length})</div>
        <input class="mgr-search" type="text" placeholder="Search order or name…" oninput="filterOrders(this.value)">
      </div>
      <div id="orders-table-wrap">${buildOrdersTable(_ordersData)}</div>
    </div>`;
}
function buildOrdersTable(rows) {
  if (!rows.length) return '<div class="mgr-empty">No orders found.</div>';
  return `<table>
    <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Country</th><th>Channel</th><th>Total</th></tr></thead>
    <tbody>${rows.map(o => `<tr>
      <td><strong>${o.OrderID}</strong></td>
      <td>${o.OrderDate}</td>
      <td>${o.customerName}</td>
      <td>${o.country}</td>
      <td><span class="badge badge-teal">${o.Channel}</span></td>
      <td>${fmt(o.OrderTotal)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}
function filterOrders(q) {
  const filtered = _ordersData.filter(o =>
    o.OrderID.toLowerCase().includes(q.toLowerCase()) ||
    o.customerName.toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('orders-table-wrap').innerHTML = buildOrdersTable(filtered);
}

// ── Customers ────────────────────────────────────────────────
let _custData = [];
function renderCustomers(d) {
  _custData = d.customers || [];
  document.getElementById('mgr-content').innerHTML = `
    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">Customers (${_custData.length})</div>
        <input class="mgr-search" type="text" placeholder="Search name or email…" oninput="filterCustomers(this.value)">
      </div>
      <div id="cust-table-wrap">${buildCustTable(_custData)}</div>
    </div>`;
}
function buildCustTable(rows) {
  if (!rows.length) return '<div class="mgr-empty">No customers found.</div>';
  return `<table>
    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Country</th><th>Joined</th><th>Orders</th><th>Lifetime Value</th><th>Loyalty</th></tr></thead>
    <tbody>${rows.map(c => `<tr>
      <td style="color:var(--gray-light);font-size:11px">${c.CustomerID}</td>
      <td><strong>${c.FirstName} ${c.LastName}</strong></td>
      <td style="color:var(--gray)">${c.email}</td>
      <td>${c.Country || '—'}</td>
      <td>${c.JoinDate}</td>
      <td>${c.orderCount}</td>
      <td>${fmt(c.lifetimeValue)}</td>
      <td>${c.loyalty ? '<span class="badge badge-teal">Yes</span>' : '<span class="badge badge-gray">No</span>'}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}
function filterCustomers(q) {
  const filtered = _custData.filter(c =>
    `${c.FirstName} ${c.LastName}`.toLowerCase().includes(q.toLowerCase()) ||
    c.email.toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('cust-table-wrap').innerHTML = buildCustTable(filtered);
}

// ── Products ─────────────────────────────────────────────────
function renderProducts(d) {
  const rows = d.products || [];
  document.getElementById('mgr-content').innerHTML = `
    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">Product Sales (All Time)</div>
      </div>
      ${rows.length ? `<table>
        <thead><tr><th>SKU</th><th>Units Sold</th><th>Revenue</th></tr></thead>
        <tbody>${rows.map(p => `<tr>
          <td><strong>${p.sku}</strong></td>
          <td>${p.units}</td>
          <td>${fmt(p.revenue)}</td>
        </tr>`).join('')}</tbody>
      </table>` : '<div class="mgr-empty">No sales data yet.</div>'}
    </div>`;
}

// ── CSV Export ───────────────────────────────────────────────
async function downloadCSV() {
  const data = await fetchSection('orders');
  if (!data) return;
  const rows = data.orders || [];
  const header = ['OrderID', 'Date', 'Customer', 'Country', 'Channel', 'Total'];
  const lines = rows.map(o => [o.OrderID, o.OrderDate, o.customerName, o.country, o.Channel, o.OrderTotal].join(','));
  const csv = [header.join(','), ...lines].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rusti-shack-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
