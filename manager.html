<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager — The Rusti Shack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy:#1A7A9E; --navy-dark:#0F5E7A; --teal:#00B4A0; --teal-light:#DFF5F2;
      --orange:#E8622A; --sand:#FEF9F1; --white:#ffffff; --light:#EBF6FA;
      --border:#CEEAF0; --gray:#5A7A8A; --gray-light:#8AAAB8; --dark:#0D2B3A;
      --sidebar-w:220px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--sand);color:var(--dark);min-height:100vh}

    /* Login */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy-dark),var(--navy))}
    .login-card{background:var(--white);border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .login-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);margin-bottom:6px}
    .login-sub{font-size:13px;color:var(--gray);margin-bottom:32px}
    .login-card label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .login-card input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none;transition:border-color .2s}
    .login-card input:focus{border-color:var(--navy)}
    .login-btn{width:100%;margin-top:20px;padding:13px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
    .login-btn:hover{background:var(--navy-dark)}
    .login-error{margin-top:12px;font-size:13px;color:#e53e3e;text-align:center;min-height:18px}

    /* Layout */
    #dashboard-screen{display:none;min-height:100vh}
    .mgr-layout{display:flex;min-height:100vh}
    .mgr-sidebar{width:var(--sidebar-w);background:var(--dark);color:var(--white);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
    .mgr-brand{padding:26px 20px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
    .mgr-brand-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--white);line-height:1.3}
    .mgr-brand-sub{font-size:11px;color:var(--gray-light);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
    .mgr-nav{padding:14px 0;flex:1}
    .mgr-nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
    .mgr-nav-item:hover{color:var(--white);background:rgba(255,255,255,.05)}
    .mgr-nav-item.active{color:var(--white);border-left-color:var(--teal);background:rgba(0,180,160,.1)}
    .mgr-signout{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.35);cursor:pointer;display:flex;align-items:center;gap:8px}
    .mgr-signout:hover{color:rgba(255,255,255,.65)}
    .mgr-main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
    .mgr-topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .mgr-page-title{font-size:16px;font-weight:700;color:var(--dark)}
    .mgr-site-link{font-size:12px;color:var(--gray);text-decoration:none}
    .mgr-site-link:hover{color:var(--navy)}
    .mgr-content{padding:24px 28px;flex:1}

    /* All-time ticker */
    .ticker-banner{background:linear-gradient(135deg,var(--navy-dark),var(--navy));border-radius:12px;padding:22px 28px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
    .ticker-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
    .ticker-value{font-size:36px;font-weight:800;color:var(--white);font-variant-numeric:tabular-nums}
    .ticker-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
    .ticker-right{text-align:right}
    .ticker-avg{font-size:20px;font-weight:700;color:rgba(255,255,255,.85)}

    /* KPI grid */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
    .kpi-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
    .kpi-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
    .kpi-value{font-size:26px;font-weight:800;color:var(--dark);line-height:1}
    .kpi-value.teal{color:var(--teal)}
    .kpi-value.navy{color:var(--navy)}
    .kpi-change{font-size:11px;margin-top:4px;font-weight:600}
    .kpi-change.up{color:#38a169}
    .kpi-change.down{color:#e53e3e}
    .kpi-change.flat{color:var(--gray-light)}

    /* Cards */
    .mgr-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
    .mgr-card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .mgr-card-title{font-size:13px;font-weight:700;color:var(--dark)}
    .chart-wrap{padding:20px;position:relative}

    /* Two-col charts */
    .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

    /* Tables */
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;padding:10px 20px;background:var(--light);border-bottom:1px solid var(--border)}
    td{padding:11px 20px;font-size:13px;border-bottom:1px solid var(--border)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--sand)}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-teal{background:var(--teal-light);color:var(--teal)}
    .badge-gray{background:var(--light);color:var(--gray)}
    .badge-orange{background:#FFF0E8;color:var(--orange)}

    /* Alert */
    .alert-box{background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:13px;color:#7B5E00;display:flex;align-items:flex-start;gap:10px}

    /* Buttons */
    .csv-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;background:var(--dark);color:var(--white);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
    .csv-btn:hover{background:var(--navy-dark)}
    .mgr-search{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;width:200px;transition:border-color .2s}
    .mgr-search:focus{border-color:var(--navy)}

    /* Loading */
    .mgr-loading{text-align:center;padding:60px 20px;color:var(--gray);font-size:14px}
    .mgr-empty{text-align:center;padding:40px 20px;color:var(--gray-light);font-size:13px}

    /* Comparison bars */
    .loyalty-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px}
    .loyalty-bar-wrap{text-align:center}
    .loyalty-bar-label{font-size:12px;color:var(--gray);margin-bottom:8px;font-weight:600}
    .loyalty-bar{height:120px;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font-size:18px;font-weight:800;color:var(--white)}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">The Rusti Shack</div>
    <div class="login-sub">Manager Portal — Authorized Access Only</div>
    <form onsubmit="submitLogin(event)">
      <label>Password</label>
      <input type="password" id="mgr-pw" autocomplete="current-password" required>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard-screen">
  <div class="mgr-layout">
    <nav class="mgr-sidebar">
      <div class="mgr-brand">
        <div class="mgr-brand-title">The Rusti Shack</div>
        <div class="mgr-brand-sub">Manager Portal</div>
      </div>
      <div class="mgr-nav">
        <div class="mgr-nav-item active" onclick="loadSection('dashboard')" id="nav-dashboard">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </div>
        <div class="mgr-nav-item" onclick="loadSection('orders')" id="nav-orders">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Orders
        </div>
        <div class="mgr-nav-item" onclick="loadSection('customers')" id="nav-customers">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          Customers
        </div>
        <div class="mgr-nav-item" onclick="loadSection('products')" id="nav-products">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Products
        </div>
      </div>
      <div class="mgr-signout" onclick="signOut()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </div>
    </nav>

    <main class="mgr-main">
      <div class="mgr-topbar">
        <div class="mgr-page-title" id="page-title">Dashboard</div>
        <a href="/" class="mgr-site-link">← Back to store</a>
      </div>
      <div class="mgr-content" id="mgr-content">
        <div class="mgr-loading">Loading…</div>
      </div>
    </main>
  </div>
</div>

<script>
let _token = sessionStorage.getItem('mgr_token') || '';
const CHART_COLORS = {
  navy: '#1A7A9E', teal: '#00B4A0', orange: '#E8622A',
  gray: '#8AAAB8', light: '#EBF6FA', border: '#CEEAF0',
};
const _charts = {};

function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

// ── Auth ──────────────────────────────────────────────────────
async function submitLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'Signing in…'; errEl.textContent = '';
  try {
    const res = await fetch('/api/manager-auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('mgr-pw').value }),
    });
    if (!res.ok) { errEl.textContent = 'Incorrect password.'; btn.disabled = false; btn.textContent = 'Sign In'; return; }
    const { token } = await res.json();
    _token = token; sessionStorage.setItem('mgr_token', token); showDashboard();
  } catch { errEl.textContent = 'Connection error.'; btn.disabled = false; btn.textContent = 'Sign In'; }
}
function signOut() {
  sessionStorage.removeItem('mgr_token'); _token = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('mgr-pw').value = '';
}
function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  loadSection('dashboard');
}
if (_token) showDashboard();

// ── Fetch ─────────────────────────────────────────────────────
async function fetchSection(section) {
  const res = await fetch(`/api/manager-data?section=${section}`, { headers: { 'x-manager-token': _token } });
  if (res.status === 401) { signOut(); return null; }
  return res.json();
}
async function loadSection(section) {
  document.querySelectorAll('.mgr-nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + section).classList.add('active');
  document.getElementById('page-title').textContent = { dashboard:'Dashboard', orders:'Orders', customers:'Customers', products:'Products' }[section];
  document.getElementById('mgr-content').innerHTML = '<div class="mgr-loading">Loading…</div>';
  Object.keys(_charts).forEach(destroyChart);
  const data = await fetchSection(section);
  if (!data) return;
  if (section === 'dashboard') renderDashboard(data);
  if (section === 'orders')    renderOrders(data);
  if (section === 'customers') renderCustomers(data);
  if (section === 'products')  renderProducts(data);
}

// ── Helpers ───────────────────────────────────────────────────
function fmt(n) { return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }); }
function pct(a, b) {
  if (!b) return '<span class="kpi-change flat">—</span>';
  const d = ((a - b) / b * 100).toFixed(0);
  return `<span class="kpi-change ${d > 0 ? 'up' : d < 0 ? 'down' : 'flat'}">${d > 0 ? '↑' : '↓'} ${Math.abs(d)}% vs last week</span>`;
}
function animateCounter(el, target, prefix='$', decimals=2) {
  const end = parseFloat(target);
  const dur = 1200; const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = end * ease;
    el.textContent = prefix + val.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard(d) {
  const html = `
    <div class="ticker-banner">
      <div>
        <div class="ticker-label">All-Time Revenue</div>
        <div class="ticker-value" id="ticker-val">$0.00</div>
        <div class="ticker-sub">${d.recentOrders.length ? 'Live from Supabase' : 'No orders yet'}</div>
      </div>
      <div class="ticker-right">
        <div class="ticker-label">Avg Order Value</div>
        <div class="ticker-avg" id="ticker-avg">$0.00</div>
        <div class="ticker-sub">${d.totalCustomers} customers total</div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Orders This Week</div>
        <div class="kpi-value navy">${d.ordersThisWeek}</div>
        ${pct(d.ordersThisWeek, d.ordersLastWeek)}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Revenue This Week</div>
        <div class="kpi-value teal">${fmt(d.revenueThisWeek)}</div>
        ${pct(d.revenueThisWeek, d.revenueLastWeek)}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Top Seller</div>
        <div class="kpi-value" style="font-size:16px;line-height:1.3">${d.topSeller}</div>
        <span class="kpi-change flat">${d.topSellerUnits} units</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Customers</div>
        <div class="kpi-value navy">${d.totalCustomers}</div>
        <span class="kpi-change flat">All time</span>
      </div>
    </div>

    <div class="mgr-card">
      <div class="mgr-card-header"><div class="mgr-card-title">Revenue — Last 30 Days</div></div>
      <div class="chart-wrap" style="height:240px"><canvas id="chart-revenue"></canvas></div>
    </div>

    <div class="chart-row">
      <div class="mgr-card">
        <div class="mgr-card-header"><div class="mgr-card-title">Orders by Day of Week</div></div>
        <div class="chart-wrap" style="height:200px"><canvas id="chart-dow"></canvas></div>
      </div>
      <div class="mgr-card">
        <div class="mgr-card-header"><div class="mgr-card-title">Customers by Country</div></div>
        <div class="chart-wrap" style="height:200px"><canvas id="chart-country"></canvas></div>
      </div>
    </div>

    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">Recent Orders</div>
        <button class="csv-btn" onclick="downloadCSV()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Sales CSV
        </button>
      </div>
      ${d.recentOrders.length ? `<table>
        <thead><tr><th>Order</th><th>Date</th><th>Customer</th><th>Total</th></tr></thead>
        <tbody>${d.recentOrders.map(o => `<tr>
          <td><strong>${o.OrderID}</strong></td><td>${o.OrderDate}</td>
          <td>${o.customerDisplay}</td><td>${fmt(o.OrderTotal)}</td>
        </tr>`).join('')}</tbody>
      </table>` : '<div class="mgr-empty">No orders yet.</div>'}
    </div>`;

  document.getElementById('mgr-content').innerHTML = html;
  animateCounter(document.getElementById('ticker-val'), d.allTimeRevenue);
  animateCounter(document.getElementById('ticker-avg'), d.avgOrderValue);

  // 30-day revenue chart
  _charts['revenue'] = new Chart(document.getElementById('chart-revenue'), {
    type: 'line',
    data: {
      labels: d.dailyRevenue.map(r => r.date.slice(5)),
      datasets: [{ label: 'Revenue', data: d.dailyRevenue.map(r => r.rev),
        borderColor: CHART_COLORS.teal, backgroundColor: 'rgba(0,180,160,.08)',
        borderWidth: 2, pointRadius: 0, fill: true, tension: 0.35 }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales: { x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:11}}},
                y:{grid:{color:'#CEEAF0'},ticks:{callback:v=>'$'+v,font:{size:11}}} } }
  });

  // Day of week
  _charts['dow'] = new Chart(document.getElementById('chart-dow'), {
    type: 'bar',
    data: { labels: d.dowLabels,
      datasets: [{ data: d.dowCounts, backgroundColor: CHART_COLORS.navy, borderRadius: 5 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales: { x:{grid:{display:false},ticks:{font:{size:11}}},
                y:{grid:{color:'#CEEAF0'},ticks:{font:{size:11},precision:0}} } }
  });

  // Countries
  _charts['country'] = new Chart(document.getElementById('chart-country'), {
    type: 'bar',
    data: { labels: d.topCountries.map(c => c.country),
      datasets: [{ data: d.topCountries.map(c => c.count), backgroundColor: CHART_COLORS.teal, borderRadius: 5 }] },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales: { x:{grid:{color:'#CEEAF0'},ticks:{font:{size:11},precision:0}},
                y:{grid:{display:false},ticks:{font:{size:11}}} } }
  });
}

// ── Orders ────────────────────────────────────────────────────
let _ordersData = [];
function renderOrders(d) {
  _ordersData = d.orders || [];
  const flagged = _ordersData.filter(o => o.needsAttention);
  const alertHtml = flagged.length ? `
    <div class="alert-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div><strong>${flagged.length} order${flagged.length>1?'s':''}</strong> placed more than 3 days ago may need follow-up:
      ${flagged.map(o => `<strong> ${o.OrderID}</strong>`).join(',')}</div>
    </div>` : '';

  document.getElementById('mgr-content').innerHTML = `
    ${alertHtml}
    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">All Orders (${_ordersData.length})</div>
        <input class="mgr-search" type="text" placeholder="Search…" oninput="filterOrders(this.value)">
      </div>
      <div id="orders-table-wrap">${buildOrdersTable(_ordersData)}</div>
    </div>`;
}
function buildOrdersTable(rows) {
  if (!rows.length) return '<div class="mgr-empty">No orders found.</div>';
  return `<table><thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Country</th><th>Channel</th><th>Total</th></tr></thead>
    <tbody>${rows.map(o => `<tr>
      <td><strong>${o.OrderID}</strong>${o.needsAttention ? ' <span class="badge badge-orange">Needs follow-up</span>' : ''}</td>
      <td>${o.OrderDate}</td><td>${o.customerName}</td><td>${o.country}</td>
      <td><span class="badge badge-teal">${o.Channel}</span></td><td>${fmt(o.OrderTotal)}</td>
    </tr>`).join('')}</tbody></table>`;
}
function filterOrders(q) {
  const f = _ordersData.filter(o => o.OrderID.toLowerCase().includes(q.toLowerCase()) || o.customerName.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('orders-table-wrap').innerHTML = buildOrdersTable(f);
}

// ── Customers ─────────────────────────────────────────────────
let _custData = [];
function renderCustomers(d) {
  _custData = d.customers || [];
  const maxLTV = Math.max(parseFloat(d.loyaltyAvgLTV), parseFloat(d.noLoyaltyAvgLTV), 1);
  const loyH = Math.round((parseFloat(d.loyaltyAvgLTV) / maxLTV) * 100);
  const noH  = Math.round((parseFloat(d.noLoyaltyAvgLTV) / maxLTV) * 100);

  document.getElementById('mgr-content').innerHTML = `
    <div class="chart-row">
      <div class="mgr-card">
        <div class="mgr-card-header"><div class="mgr-card-title">Loyalty vs Non-Loyalty Avg Spend</div></div>
        <div class="loyalty-compare">
          <div class="loyalty-bar-wrap">
            <div class="loyalty-bar-label">Loyalty Members</div>
            <div class="loyalty-bar" style="background:var(--teal);height:${loyH}px">${fmt(d.loyaltyAvgLTV)}</div>
          </div>
          <div class="loyalty-bar-wrap">
            <div class="loyalty-bar-label">Non-Members</div>
            <div class="loyalty-bar" style="background:var(--navy);height:${noH}px">${fmt(d.noLoyaltyAvgLTV)}</div>
          </div>
        </div>
      </div>
      <div class="mgr-card">
        <div class="mgr-card-header"><div class="mgr-card-title">New Customers by Month</div></div>
        <div class="chart-wrap" style="height:180px"><canvas id="chart-new-cust"></canvas></div>
      </div>
    </div>
    <div class="mgr-card">
      <div class="mgr-card-header"><div class="mgr-card-title">Customers by Country</div></div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-cust-country"></canvas></div>
    </div>
    <div class="mgr-card">
      <div class="mgr-card-header">
        <div class="mgr-card-title">All Customers (${_custData.length})</div>
        <input class="mgr-search" type="text" placeholder="Search name or email…" oninput="filterCustomers(this.value)">
      </div>
      <div id="cust-table-wrap">${buildCustTable(_custData)}</div>
    </div>`;

  _charts['newcust'] = new Chart(document.getElementById('chart-new-cust'), {
    type: 'bar',
    data: { labels: d.newByMonth.map(m => m.month.slice(5)),
      datasets: [{ data: d.newByMonth.map(m => m.count), backgroundColor: CHART_COLORS.orange, borderRadius: 5 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales: { x:{grid:{display:false},ticks:{font:{size:11}}},
                y:{grid:{color:'#CEEAF0'},ticks:{font:{size:11},precision:0}} } }
  });

  _charts['custcountry'] = new Chart(document.getElementById('chart-cust-country'), {
    type: 'bar',
    data: { labels: d.countryDist.map(c => c.country),
      datasets: [{ data: d.countryDist.map(c => c.count), backgroundColor: CHART_COLORS.navy, borderRadius: 5 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales: { x:{grid:{display:false},ticks:{font:{size:11},maxRotation:30}},
                y:{grid:{color:'#CEEAF0'},ticks:{font:{size:11},precision:0}} } }
  });
}
function buildCustTable(rows) {
  if (!rows.length) return '<div class="mgr-empty">No customers found.</div>';
  return `<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Country</th><th>Joined</th><th>Orders</th><th>Lifetime Value</th><th>Loyalty</th></tr></thead>
    <tbody>${rows.map(c => `<tr>
      <td style="color:var(--gray-light);font-size:11px">${c.CustomerID}</td>
      <td><strong>${c.FirstName} ${c.LastName}</strong></td>
      <td style="color:var(--gray)">${c.email}</td><td>${c.Country||'—'}</td>
      <td>${c.JoinDate}</td><td>${c.orderCount}</td><td>${fmt(c.lifetimeValue)}</td>
      <td>${c.loyalty ? '<span class="badge badge-teal">Yes</span>' : '<span class="badge badge-gray">No</span>'}</td>
    </tr>`).join('')}</tbody></table>`;
}
function filterCustomers(q) {
  const f = _custData.filter(c => `${c.FirstName} ${c.LastName}`.toLowerCase().includes(q.toLowerCase()) || c.email.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('cust-table-wrap').innerHTML = buildCustTable(f);
}

// ── Products ──────────────────────────────────────────────────
function renderProducts(d) {
  const rows = d.products || [];
  const top5 = rows.slice(0, 5);
  const bot5 = rows.slice(-5).reverse();

  document.getElementById('mgr-content').innerHTML = `
    <div class="mgr-card">
      <div class="mgr-card-header"><div class="mgr-card-title">Revenue by Category</div></div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-cat"></canvas></div>
    </div>
    <div class="chart-row">
      <div class="mgr-card">
        <div class="mgr-card-header"><div class="mgr-card-title">Top 5 Products</div></div>
        <table><thead><tr><th>SKU</th><th>Name</th><th>Units</th><th>Revenue</th></tr></thead>
        <tbody>${top5.map(p=>`<tr><td><strong>${p.sku}</strong></td><td>${p.name}</td><td>${p.units}</td><td>${fmt(p.revenue)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div class="mgr-card">
        <div class="mgr-card-header"><div class="mgr-card-title">Slowest 5 Products</div></div>
        <table><thead><tr><th>SKU</th><th>Name</th><th>Units</th><th>Revenue</th></tr></thead>
        <tbody>${bot5.map(p=>`<tr><td><strong>${p.sku}</strong></td><td>${p.name}</td><td>${p.units}</td><td>${fmt(p.revenue)}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>
    <div class="mgr-card">
      <div class="mgr-card-header"><div class="mgr-card-title">All Products (${rows.length})</div></div>
      ${rows.length ? `<table><thead><tr><th>SKU</th><th>Name</th><th>Category</th><th>Units Sold</th><th>Revenue</th></tr></thead>
      <tbody>${rows.map(p=>`<tr><td><strong>${p.sku}</strong></td><td>${p.name}</td><td>${p.category}</td><td>${p.units}</td><td>${fmt(p.revenue)}</td></tr>`).join('')}</tbody></table>`
      : '<div class="mgr-empty">No sales data yet.</div>'}
    </div>`;

  if (d.byCategory.length) {
    _charts['cat'] = new Chart(document.getElementById('chart-cat'), {
      type: 'bar',
      data: { labels: d.byCategory.map(c => c.cat),
        datasets: [{ data: d.byCategory.map(c => c.rev),
          backgroundColor: [CHART_COLORS.teal, CHART_COLORS.navy, CHART_COLORS.orange, CHART_COLORS.gray],
          borderRadius: 6 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales: { x:{grid:{display:false},ticks:{font:{size:12}}},
                  y:{grid:{color:'#CEEAF0'},ticks:{callback:v=>'$'+v,font:{size:11}}} } }
    });
  }
}

// ── CSV ───────────────────────────────────────────────────────
async function downloadCSV() {
  const data = await fetchSection('orders');
  if (!data) return;
  const header = ['OrderID','Date','Customer','Country','Channel','Total'];
  const lines = (data.orders||[]).map(o => [o.OrderID,o.OrderDate,o.customerName,o.country,o.Channel,o.OrderTotal].join(','));
  const blob = new Blob([[header.join(','),...lines].join('\n')], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rusti-shack-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
