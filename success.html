<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — The Rusti Shack</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box; }
    .success-card { max-width: 520px; width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 48px 36px; text-align: center; }
    .success-icon { color: var(--teal); margin-bottom: 20px; }
    .success-card h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark); margin: 0 0 8px; }
    .order-code { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; color: var(--teal); text-transform: uppercase; margin-bottom: 16px; }
    .success-msg { font-size: 15px; color: var(--gray); line-height: 1.7; margin-bottom: 32px; }
    .success-summary { text-align: left; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
    .s-line { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 14px; border-bottom: 1px solid var(--border); color: var(--dark); }
    .s-line:last-child { border-bottom: none; }
    .s-ship { color: var(--gray); }
    .s-total { font-weight: 700; background: var(--bg); }
    .success-btn { display: inline-block; padding: 12px 32px; background: var(--teal); color: var(--white); border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background .2s; }
    .success-btn:hover { background: var(--navy); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="success-card">
    <div class="success-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h1>Order Confirmed!</h1>
    <p class="order-code" id="order-code"></p>
    <p class="success-msg" id="success-msg">Payment received. We'll send shipping details to your email shortly.</p>
    <div class="success-summary" id="success-summary" style="display:none"></div>
    <a href="/" class="success-btn">Continue Shopping</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get('order');
    if (orderCode) {
      document.getElementById('order-code').textContent = orderCode;

      // Read the pending order, render it, then immediately remove PII from
      // localStorage — §4: store only what the business needs, as briefly as needed
      const order = JSON.parse(localStorage.getItem('rusti_pending_order') || 'null');
      if (order && order.orderCode === orderCode) {
        document.getElementById('success-msg').innerHTML =
          `Payment received, ${order.customer.firstName}. Shipping details will be sent to <strong>${order.customer.email}</strong>.`;
        const linesHtml = order.lines.map(l =>
          `<div class="s-line"><span>${l.name}${l.color ? ' · ' + l.color : ''}${l.size ? ' · ' + l.size : ''} ×${l.qty}</span></div>`
        ).join('');
        const summary = document.getElementById('success-summary');
        summary.innerHTML = linesHtml +
          `<div class="s-line s-ship"><span>Shipping (SHIP-INTL)</span></div>` +
          `<div class="s-line s-total"><span>Total confirmed by Stripe payment</span></div>`;
        summary.style.display = '';

        // Clear PII now that it has been displayed — don't leave it sitting in storage
        localStorage.removeItem('rusti_pending_order');
      }
    }
  </script>
</body>
</html>
